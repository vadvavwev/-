# GitHub Actions 自动化部署到阿里云ECS
# 方案：GitHub Actions 构建镜像 → 推送到阿里云ACR → ECS 从ACR拉取

name: Deploy Backend

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 下载代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录阿里云ACR
      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v1
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. 构建镜像
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/czxaaa1/aaa1:${{ github.sha }} ./backend
          docker build -t ${{ secrets.ACR_REGISTRY }}/czxaaa1/aaa1:latest ./backend

      # 5. 推送镜像到ACR
      - name: Push image to ACR
        run: |
          docker push ${{ secrets.ACR_REGISTRY }}/czxaaa1/aaa1:${{ github.sha }}
          docker push ${{ secrets.ACR_REGISTRY }}/czxaaa1/aaa1:latest

      # 6. 部署到阿里云ECS
      - name: Deploy to Alibaba Cloud ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_ECS_HOST }}
          port: ${{ secrets.ALIYUN_ECS_PORT }}
          username: ${{ secrets.ALIYUN_ECS_USER }}
          password: ${{ secrets.ALIYUN_ECS_PASSWORD }}
          script: |
            docker stop enterprise-assistant-backend || true
            docker rm enterprise-assistant-backend || true
            docker pull ${{ secrets.ACR_REGISTRY }}/czxaaa1/aaa1:latest
            docker run -d \
              --name enterprise-assistant-backend \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -p 5000:5000 \
              --restart unless-stopped \
              ${{ secrets.ACR_REGISTRY }}/czxaaa1/aaa1:latest

      # 7. 健康检查
      - name: Verify deployment
        run: |
          sleep 15
          curl -f http://${{ secrets.ALIYUN_ECS_HOST }}:5000/api/health || {
            echo "Health check failed"
            exit 1
          }
          echo "Deployment successful!"